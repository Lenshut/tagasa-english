<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tagasa Report Card</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@700;800;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            color: #1c1917;
        }
        
        .bg-elegant-gradient {
            background: linear-gradient(135deg, #fafaf9 0%, #f5f5f4 50%, #eef2ff 100%);
        }

        .logo-text {
            font-family: 'Montserrat', sans-serif;
            letter-spacing: -0.04em;
            background: linear-gradient(to right, #0f766e, #4338ca);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-font {
            font-family: 'Montserrat', sans-serif;
        }

        /* Added Relative Positioning and Custom SVG Background Pattern */
        .print-container {
            position: relative;
            background-color: white !important;
            z-index: 1;
        }

        .print-container::before {
            content: "";
            position: absolute;
            inset: 0;
            /* Seamless SVG Pattern: Pencil, Notebook, Apple, Ruler */
            background-image: url("data:image/svg+xml,%3Csvg width='120' height='120' viewBox='0 0 120 120' xmlns='http://www.w3.org/2000/svg'%3E%3Cg stroke='%23000' stroke-width='2' fill='none' stroke-linecap='round' stroke-linejoin='round' opacity='0.12'%3E%3Cpath d='M15,35 l-5,10 l10,-5 z m0,0 l20,-20 l5,5 l-20,20 z m20,-20 l-5,5'/%3E%3Crect x='70' y='20' width='30' height='25' rx='2'/%3E%3Cpath d='M75,25 h20 m-20,5 h20 m-20,5 h20'/%3E%3Cpath d='M30,90 a10,10 0 0,0 20,0 a10,10 0 0,0 -20,0 M40,80 c0,-5 5,-10 10,-10'/%3E%3Cpolygon points='70,100 100,100 70,70'/%3E%3Cpath d='M75,95 v5 m5,-5 v5 m5,-5 v5 m10,-5 v5 M75,75 h5 m-5,5 h5 m-5,5 h5'/%3E%3Cpath d='M10,80 h10 m-5,-5 v10'/%3E%3Ccircle cx='50' cy='50' r='3'/%3E%3Cpath d='M90,50 h10 m-10,5 h10'/%3E%3C/g%3E%3C/svg%3E");
            background-size: 120px 120px;
            z-index: -1;
            pointer-events: none;
        }

        td[contenteditable="true"]:focus {
            outline: 2px solid #0d9488;
            outline-offset: -2px;
            background-color: #f0fdfa;
        }

        /* Essential Print Formatting Rules */
        @media print {
            @page {
                size: A4 portrait;
                margin: 12mm;
            }
            
            body {
                background: white !important;
                padding: 0 !important;
                margin: 0 !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }

            .no-print {
                display: none !important;
            }

            .print-container {
                box-shadow: none !important;
                border: none !important;
                margin: 0 auto !important;
                padding: 0 !important;
                width: 100% !important;
                max-width: 100% !important;
            }

            .print-container::before {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }

            /* Force borders to render clearly in PDF */
            table, th, td {
                border-collapse: collapse !important;
            }
            
            thead {
                display: table-header-group;
            }
            
            tr {
                page-break-inside: avoid;
            }

            /* Forces a physical page break for the second page */
            .page-break {
                page-break-before: always;
            }
        }
    </style>
</head>
<body class="antialiased bg-elegant-gradient min-h-screen p-4 md:p-10">
    
    <div class="no-print max-w-6xl mx-auto mb-6 flex justify-end">
        <button onclick="window.print()" class="bg-teal-600 hover:bg-teal-700 text-white font-bold py-2.5 px-6 rounded-full shadow-lg hover:shadow-teal-500/30 transition-all duration-300 flex items-center gap-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path></svg>
            Print Report
        </button>
    </div>

    <!-- PAGE 1 -->
    <main class="print-container max-w-6xl mx-auto rounded-3xl shadow-2xl border border-stone-200 p-8 md:p-12">
        
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 pb-4 border-b-2 border-black">
            <div class="flex items-center gap-3 mb-4 md:mb-0">
                <svg viewBox="0 0 100 80" class="w-auto h-[32px] md:h-[40px] overflow-visible drop-shadow-md">
                    <defs>
                        <linearGradient id="patent-teal-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#0f766e"/>
                            <stop offset="100%" stop-color="#5eead4"/>
                        </linearGradient>
                    </defs>
                    <g>
                        <path d="M 10 0 H 90 C 95.523 0 100 4.477 100 10 V 70 C 100 75.523 95.523 80 90 80 H 25 L 0 105 V 10 C 0 4.477 4.477 0 10 0 Z" fill="url(#patent-teal-grad)" stroke="#ffffff" stroke-width="2"/>
                        <rect x="20" y="16" width="60" height="10" rx="3" fill="white"/>
                        <rect x="40" y="32" width="20" height="10" rx="3" fill="white"/>
                        <rect x="45" y="48" width="10" height="10" rx="3" fill="white"/>
                        <circle cx="50" cy="68" r="4.5" fill="white"/>
                    </g>
                </svg>
                <span class="font-black logo-text uppercase text-[32px] md:text-[40px] leading-none">TAGASA</span>
            </div>
            <div class="text-left md:text-right">
                <h1 class="header-font text-2xl font-bold text-black uppercase tracking-wide underline bg-white/80 px-2 rounded">Laporan Perkembangan Siswa</h1>
            </div>
        </div>

        <table class="border-collapse w-full mb-6 text-sm md:text-base bg-white">
            <tbody>
                <tr>
                    <td class="border border-black bg-teal-50 text-teal-900 font-bold px-3 py-2 w-[10%]">Nama</td>
                    <td class="border border-black px-3 py-1 w-[30%] align-bottom">
                        <div class="w-full border-b-[2px] border-dotted border-black h-5 mb-1"></div>
                    </td>
                    <td class="border border-black bg-teal-50 text-teal-900 font-bold px-3 py-2 w-[8%]">Umur</td>
                    <td class="border border-black px-3 py-1 w-[12%] align-bottom">
                        <div class="w-full border-b-[2px] border-dotted border-black h-5 mb-1"></div>
                    </td>
                    <td class="border border-black bg-teal-50 text-teal-900 font-bold px-3 py-2 w-[8%]">Kelas</td>
                    <td class="border border-black px-3 py-1 w-[17%] align-bottom">
                        <div class="w-full border-b-[2px] border-dotted border-black h-5 mb-1"></div>
                    </td>
                    <td class="border border-black bg-teal-50 text-teal-900 font-bold px-3 py-2 w-[8%]">Sesi</td>
                    <td class="border border-black px-3 py-1 w-[7%] align-bottom">
                        <div class="w-full border-b-[2px] border-dotted border-black h-5 mb-1"></div>
                    </td>
                </tr>
            </tbody>
        </table>

        <div class="w-full">
            <table class="border-collapse w-full text-center text-sm md:text-base table-fixed bg-white">
                <colgroup>
                    <col style="width: 12%;">
                    <col style="width: 8%;">
                    <col style="width: 9%;">
                    <col style="width: 9%;">
                    <col style="width: 9%;">
                    <col style="width: 9%;">
                    <col style="width: 44%;">
                </colgroup>
                <thead>
                    <tr>
                        <th rowspan="2" class="border border-black bg-teal-700 text-white font-semibold px-2 py-3 header-font tracking-wide align-middle">Tanggal</th>
                        <th rowspan="2" class="border border-black bg-teal-700 text-white font-semibold px-2 py-3 header-font tracking-wide align-middle">Fase</th>
                        <th colspan="4" class="border border-black bg-teal-700 text-white font-semibold px-2 py-3 header-font tracking-wide">Materi</th>
                        <th rowspan="2" class="border border-black bg-teal-700 text-white font-semibold px-4 py-3 text-center header-font tracking-wide align-middle">Catatan</th>
                    </tr>
                    <tr>
                        <th class="border border-black px-1 py-2 bg-blue-100 text-blue-900 font-semibold align-middle text-xs">Writing</th>
                        <th class="border border-black px-1 py-2 bg-emerald-100 text-emerald-900 font-semibold align-middle text-xs">Reading</th>
                        <th class="border border-black px-1 py-2 bg-amber-100 text-amber-900 font-semibold align-middle text-xs">Speaking</th>
                        <th class="border border-black px-1 py-2 bg-violet-100 text-violet-900 font-semibold align-middle text-xs">Grammar</th>
                    </tr>
                </thead>
                <tbody id="table-body-page1" class="text-black">
                    <!-- Javascript will inject 8 rows here -->
                </tbody>
            </table>
        </div>
    </main>

    <!-- PAGE 2 -->
    <!-- Added "page-break" class for printing, and top margin for screen viewing -->
    <main class="print-container max-w-6xl mx-auto rounded-3xl shadow-2xl border border-stone-200 p-8 md:p-12 mt-8 print:mt-0 page-break">
        
        <!-- Header / Logo remains the same -->
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 pb-4 border-b-2 border-black">
            <div class="flex items-center gap-3 mb-4 md:mb-0">
                <svg viewBox="0 0 100 80" class="w-auto h-[32px] md:h-[40px] overflow-visible drop-shadow-md">
                    <defs>
                        <linearGradient id="patent-teal-grad-2" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#0f766e"/>
                            <stop offset="100%" stop-color="#5eead4"/>
                        </linearGradient>
                    </defs>
                    <g>
                        <path d="M 10 0 H 90 C 95.523 0 100 4.477 100 10 V 70 C 100 75.523 95.523 80 90 80 H 25 L 0 105 V 10 C 0 4.477 4.477 0 10 0 Z" fill="url(#patent-teal-grad-2)" stroke="#ffffff" stroke-width="2"/>
                        <rect x="20" y="16" width="60" height="10" rx="3" fill="white"/>
                        <rect x="40" y="32" width="20" height="10" rx="3" fill="white"/>
                        <rect x="45" y="48" width="10" height="10" rx="3" fill="white"/>
                        <circle cx="50" cy="68" r="4.5" fill="white"/>
                    </g>
                </svg>
                <span class="font-black logo-text uppercase text-[32px] md:text-[40px] leading-none">TAGASA</span>
            </div>
            <div class="text-left md:text-right">
                <h1 class="header-font text-2xl font-bold text-black uppercase tracking-wide underline bg-white/80 px-2 rounded">Laporan Perkembangan Siswa</h1>
            </div>
        </div>

        <!-- Omitted Personal Information Table here -->

        <!-- Main Report Table -->
        <div class="w-full">
            <table class="border-collapse w-full text-center text-sm md:text-base table-fixed bg-white">
                <colgroup>
                    <col style="width: 12%;">
                    <col style="width: 8%;">
                    <col style="width: 9%;">
                    <col style="width: 9%;">
                    <col style="width: 9%;">
                    <col style="width: 9%;">
                    <col style="width: 44%;">
                </colgroup>
                <thead>
                    <tr>
                        <th rowspan="2" class="border border-black bg-teal-700 text-white font-semibold px-2 py-3 header-font tracking-wide align-middle">Tanggal</th>
                        <th rowspan="2" class="border border-black bg-teal-700 text-white font-semibold px-2 py-3 header-font tracking-wide align-middle">Fase</th>
                        <th colspan="4" class="border border-black bg-teal-700 text-white font-semibold px-2 py-3 header-font tracking-wide">Materi</th>
                        <th rowspan="2" class="border border-black bg-teal-700 text-white font-semibold px-4 py-3 text-center header-font tracking-wide align-middle">Catatan</th>
                    </tr>
                    <tr>
                        <th class="border border-black px-1 py-2 bg-blue-100 text-blue-900 font-semibold align-middle text-xs">Writing</th>
                        <th class="border border-black px-1 py-2 bg-emerald-100 text-emerald-900 font-semibold align-middle text-xs">Reading</th>
                        <th class="border border-black px-1 py-2 bg-amber-100 text-amber-900 font-semibold align-middle text-xs">Speaking</th>
                        <th class="border border-black px-1 py-2 bg-violet-100 text-violet-900 font-semibold align-middle text-xs">Grammar</th>
                    </tr>
                </thead>
                <tbody id="table-body-page2" class="text-black">
                    <!-- Javascript will inject 9 rows here (1 extra to fill the space left by personal info) -->
                </tbody>
            </table>
        </div>
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const tbodyPage1 = document.getElementById('table-body-page1');
            const tbodyPage2 = document.getElementById('table-body-page2');
            
            // Reusable HTML structure for a table row
            const rowHTML = `
                <td class="border border-black align-middle" style="height: 65px; background-color: #fafaf9;">
                    <div style="border-bottom: 2px dotted black; width: 90%; margin: 15px auto 0 auto;"></div>
                </td>
                <td class="border border-black align-middle" style="height: 65px; background-color: #fafaf9;">
                    <div style="border-bottom: 2px dotted black; width: 90%; margin: 15px auto 0 auto;"></div>
                </td>
                <td class="border border-black align-middle" style="height: 65px; background-color: #eff6ff;">
                    <div style="border-bottom: 2px dotted black; width: 90%; margin: 15px auto 0 auto;"></div>
                </td>
                <td class="border border-black align-middle" style="height: 65px; background-color: #ecfdf5;">
                    <div style="border-bottom: 2px dotted black; width: 90%; margin: 15px auto 0 auto;"></div>
                </td>
                <td class="border border-black align-middle" style="height: 65px; background-color: #fffbeb;">
                    <div style="border-bottom: 2px dotted black; width: 90%; margin: 15px auto 0 auto;"></div>
                </td>
                <td class="border border-black align-middle" style="height: 65px; background-color: #f5f3ff;">
                    <div style="border-bottom: 2px dotted black; width: 90%; margin: 15px auto 0 auto;"></div>
                </td>
                <td class="border border-black align-middle" style="height: 65px; background-color: #fafaf9;">
                    <div style="display: flex; flex-direction: column; justify-content: space-evenly; height: 100%;">
                        <div style="border-bottom: 2px dotted black; width: 95%; margin: 0 auto;"></div>
                        <div style="border-bottom: 2px dotted black; width: 95%; margin: 0 auto;"></div>
                    </div>
                </td>
            `;

            // Function to generate rows for a given table body
            function generateRows(tbodyElement, rowCount) {
                for (let i = 0; i < rowCount; i++) {
                    const tr = document.createElement('tr');
                    tr.innerHTML = rowHTML;
                    tbodyElement.appendChild(tr);
                }
            }

            // Page 1 gets 8 rows
            generateRows(tbodyPage1, 8);
            
            // Page 2 gets 8 rows (same as page 1, maintaining consistent layout)
            generateRows(tbodyPage2, 8);
        });
    </script>
</body>
</html>
